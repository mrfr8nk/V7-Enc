<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MR FRANK // Obfuscator v2</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ice:    #00f0ff;
  --ice2:   #00b8d4;
  --blue:   #0055ff;
  --dark:   #020912;
  --panel:  #030d1c;
  --border: #0b2244;
  --text:   #8ec8dd;
  --dim:    rgba(142,200,221,0.35);
  --green:  #00ff88;
  --red:    #ff2b4a;
  --yellow: #ffcc00;
  --font-mono: 'Share Tech Mono', monospace;
  --font-head: 'Bebas Neue', sans-serif;
}

html { scroll-behavior: smooth; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  overflow-x: hidden;
}

/* grid bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(0,240,255,.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,255,.025) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none; z-index: 0;
}

/* scanlines */
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.09) 3px, rgba(0,0,0,.09) 4px);
  pointer-events: none; z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  max-width: 780px;
  margin: 0 auto;
  padding: 48px 20px 100px;
}

/* ── HEADER ── */
.hdr { text-align: center; margin-bottom: 44px; }

.logo-line {
  display: flex; align-items: center; justify-content: center; gap: 18px;
}
.logo-bar { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--ice2)); }
.logo-bar.r { background: linear-gradient(90deg, var(--ice2), transparent); }

.logo {
  font-family: var(--font-head);
  font-size: clamp(52px, 12vw, 100px);
  letter-spacing: 10px;
  line-height: 1;
  background: linear-gradient(140deg, #fff 0%, var(--ice) 40%, var(--blue) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 18px rgba(0,240,255,.35));
  animation: flkr 9s infinite;
}

@keyframes flkr {
  0%,100%{opacity:1} 91%{opacity:1} 92%{opacity:.3} 93%{opacity:1} 96%{opacity:.7} 97%{opacity:1}
}

.badge {
  margin-top: 10px;
  font-size: 10px; letter-spacing: 5px; color: var(--ice2);
  opacity: .6; text-transform: uppercase;
}
.badge b { color: var(--ice); opacity: .9; }

/* ── CARD ── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 30px 32px;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent 0%, var(--ice) 50%, transparent 100%);
  opacity: .5;
}

.card-label {
  font-size: 9px; letter-spacing: 5px; color: var(--ice); opacity: .5;
  text-transform: uppercase; margin-bottom: 24px;
}

/* ── FORM GRID ── */
.grid-2 {
  display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
}
@media(max-width:560px){ .grid-2 { grid-template-columns: 1fr; } }

.field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
.field:last-child { margin-bottom: 0; }

label {
  font-size: 9px; letter-spacing: 4px; color: var(--ice2);
  opacity: .7; text-transform: uppercase;
}

.inp-wrap { position: relative; display: flex; align-items: center; }
.inp-icon {
  position: absolute; left: 14px;
  font-size: 14px; opacity: .35; pointer-events: none;
  user-select: none;
}

input, textarea {
  width: 100%;
  background: rgba(0,240,255,.03);
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 11px 14px 11px 36px;
  outline: none;
  transition: border .2s, box-shadow .2s, background .2s;
}

input:focus, textarea:focus {
  border-color: rgba(0,240,255,.45);
  box-shadow: 0 0 22px rgba(0,240,255,.07);
  background: rgba(0,240,255,.055);
}

input::placeholder, textarea::placeholder { color: rgba(142,200,221,.2); }

.eye-btn {
  position: absolute; right: 12px;
  background: none; border: none; cursor: pointer;
  color: var(--dim); font-size: 13px;
  transition: color .2s;
}
.eye-btn:hover { color: var(--ice); }

textarea {
  padding-left: 14px; resize: vertical; min-height: 68px;
}

/* ── BUTTON ── */
.run-btn {
  width: 100%; padding: 17px;
  background: transparent;
  border: 1px solid var(--ice);
  color: var(--ice);
  font-family: var(--font-head);
  font-size: 22px; letter-spacing: 7px;
  cursor: pointer;
  position: relative; overflow: hidden;
  border-radius: 2px;
  transition: box-shadow .3s, text-shadow .3s;
}
.run-btn::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--ice), var(--ice2));
  opacity: 0; transition: opacity .3s;
}
.run-btn:hover::before { opacity: .1; }
.run-btn:hover { box-shadow: 0 0 35px rgba(0,240,255,.2); text-shadow: 0 0 20px var(--ice); }
.run-btn:active { transform: scale(.99); }
.run-btn:disabled { opacity: .35; cursor: not-allowed; pointer-events: none; }
.run-btn span { position: relative; z-index: 1; }

/* ── PROGRESS / LOG ── */
#progCard { display: none; }

.prog-track {
  background: rgba(0,240,255,.06);
  border: 1px solid var(--border);
  border-radius: 2px; height: 5px; overflow: hidden; margin-bottom: 14px;
}
.prog-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ice2), var(--ice));
  box-shadow: 0 0 12px var(--ice);
  width: 0%; transition: width .4s;
}
.prog-fill.spin {
  width: 35% !important;
  animation: spin 1.3s ease-in-out infinite;
}
@keyframes spin {
  0%  { transform: translateX(-100%); }
  100%{ transform: translateX(350%); }
}

.log-box {
  max-height: 260px; overflow-y: auto;
  font-size: 11.5px; line-height: 1.9;
  padding-right: 4px;
}
.log-box::-webkit-scrollbar { width: 3px; }
.log-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.log-line { display: flex; gap: 8px; align-items: flex-start; }
.log-line .ic { flex-shrink: 0; margin-top: 1px; }
.log-line .msg { color: var(--dim); word-break: break-all; }
.log-line.step .msg { color: var(--text); }
.log-line.ok   .ic  { color: var(--green); }
.log-line.ok   .msg { color: rgba(0,255,136,.6); }
.log-line.fail .ic  { color: var(--red); }
.log-line.fail .msg { color: rgba(255,43,74,.6); }
.log-line.skip .ic  { color: var(--yellow); }
.log-line.error .msg, .log-line.error .ic { color: var(--red); }
.log-line.info .msg { color: var(--dim); font-style: italic; }

/* ── RESULTS ── */
#doneCard { display: none; }

.stats-row {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 12px;
  margin-bottom: 20px;
}
@media(max-width:480px){ .stats-row { grid-template-columns: repeat(2,1fr); } }

.stat {
  background: rgba(0,240,255,.04);
  border: 1px solid var(--border); border-radius: 2px;
  padding: 18px 10px; text-align: center;
}
.stat-n { font-family: var(--font-head); font-size: 40px; line-height: 1; }
.stat-n.c-ice  { color: var(--ice); }
.stat-n.c-grn  { color: var(--green); }
.stat-n.c-red  { color: var(--red); }
.stat-n.c-yel  { color: var(--yellow); }
.stat-l { font-size: 8px; letter-spacing: 3px; color: var(--dim); margin-top: 4px; }

.success-banner {
  border: 1px solid rgba(0,255,136,.3);
  background: rgba(0,255,136,.05);
  border-radius: 2px;
  padding: 20px 24px;
  text-align: center;
  color: var(--green);
  font-family: var(--font-head);
  font-size: 18px; letter-spacing: 5px;
  margin-bottom: 16px;
  text-shadow: 0 0 20px rgba(0,255,136,.4);
}

.file-scroll {
  max-height: 180px; overflow-y: auto;
  font-size: 11px; line-height: 1.9;
  margin-top: 14px;
}
.file-scroll::-webkit-scrollbar { width: 3px; }
.file-scroll::-webkit-scrollbar-thumb { background: var(--border); }

.fe { display: flex; gap: 7px; }
.fe .fp { color: var(--dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.fe.s-ok  .ic { color: var(--green); }
.fe.s-err .ic { color: var(--red); }
.fe.s-skp .ic { color: var(--yellow); }

/* ── ERROR BOX ── */
#errBox {
  display: none;
  border: 1px solid rgba(255,43,74,.35);
  background: rgba(255,43,74,.06);
  border-radius: 2px;
  padding: 14px 18px;
  color: var(--red);
  font-size: 12.5px;
  margin-bottom: 18px;
}

/* ── FOOTER ── */
.foot {
  text-align: center; margin-top: 64px;
  font-size: 9px; letter-spacing: 4px; color: rgba(142,200,221,.18);
}
.foot b { color: var(--ice); opacity: .4; }
</style>
</head>
<body>
<div class="wrap">

  <!-- HEADER -->
  <header class="hdr">
    <div class="logo-line">
      <div class="logo-bar"></div>
      <div class="logo">MR FRANK</div>
      <div class="logo-bar r"></div>
    </div>
    <div class="badge">SubZero MD V7 &nbsp;·&nbsp; <b>@GlobalTechInfo</b> &nbsp;·&nbsp; Code Obfuscator v2</div>
  </header>

  <!-- ERROR -->
  <div id="errBox"></div>

  <!-- FORM -->
  <div class="card" id="formCard">
    <div class="card-label">// Repository Configuration</div>

    <div class="field">
      <label>Source Repo URL &nbsp;<span style="opacity:.4">(private)</span></label>
      <div class="inp-wrap">
        <span class="inp-icon">⬇</span>
        <input type="text" id="sourceUrl" placeholder="https://github.com/you/private-repo">
      </div>
    </div>

    <div class="field">
      <label>GitHub Access Token</label>
      <div class="inp-wrap">
        <span class="inp-icon">🔑</span>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
        <button class="eye-btn" onclick="togglePass('token', this)" title="Show/hide">👁</button>
      </div>
    </div>

    <div class="field">
      <label>Target Repo URL &nbsp;<span style="opacity:.4">(encrypted code pushed here)</span></label>
      <div class="inp-wrap">
        <span class="inp-icon">⬆</span>
        <input type="text" id="targetUrl" placeholder="https://github.com/you/public-obfuscated-repo">
      </div>
    </div>

    <div class="grid-2">
      <div class="field">
        <label>Git Username</label>
        <div class="inp-wrap">
          <span class="inp-icon">👤</span>
          <input type="text" id="username" placeholder="GlobalTechInfo">
        </div>
      </div>
      <div class="field">
        <label>Git Email</label>
        <div class="inp-wrap">
          <span class="inp-icon">✉</span>
          <input type="text" id="email" placeholder="you@gmail.com">
        </div>
      </div>
    </div>

    <div class="field" style="margin-top:6px">
      <label>Custom Banner Comment &nbsp;<span style="opacity:.4">(optional)</span></label>
      <textarea id="banner" placeholder="// Powered by MR FRANK | SubZero MD V7 | @GlobalTechInfo"></textarea>
    </div>

    <div style="margin-top:20px">
      <button class="run-btn" id="runBtn" onclick="run()">
        <span>⟣── ENCRYPT & PUSH ──⟢</span>
      </button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div class="card" id="progCard">
    <div class="card-label">// Live Output</div>
    <div class="prog-track"><div class="prog-fill spin" id="progFill"></div></div>
    <div class="log-box" id="logBox"></div>
  </div>

  <!-- DONE -->
  <div class="card" id="doneCard">
    <div class="card-label">// Operation Complete</div>

    <div class="success-banner">⟣── PUSH SUCCESSFUL ──⟢</div>

    <div class="stats-row">
      <div class="stat"><div class="stat-n c-ice"  id="sTotal">0</div><div class="stat-l">TOTAL</div></div>
      <div class="stat"><div class="stat-n c-grn"  id="sObf">0</div><div class="stat-l">ENCRYPTED</div></div>
      <div class="stat"><div class="stat-n c-yel"  id="sSkip">0</div><div class="stat-l">SKIPPED</div></div>
      <div class="stat"><div class="stat-n c-red"  id="sFail">0</div><div class="stat-l">FAILED</div></div>
    </div>

    <div class="file-scroll" id="fileList"></div>

    <div style="margin-top:18px">
      <button class="run-btn" onclick="reset()" style="font-size:16px;letter-spacing:5px;">
        <span>⟣── RUN AGAIN ──⟢</span>
      </button>
    </div>
  </div>

  <footer class="foot">⟣── POWERED BY <b>MR FRANK</b> // SUBZERO MD V7 // @GLOBALTECH​INFO ──⟢</footer>
</div>

<script>
function togglePass(id, btn) {
  const el = document.getElementById(id);
  el.type = el.type === 'password' ? 'text' : 'password';
  btn.textContent = el.type === 'password' ? '👁' : '🙈';
}

function addLog(type, msg) {
  const box = document.getElementById('logBox');
  const icons = { step:'▸', ok:'✓', fail:'✗', skip:'⏭', error:'✗', info:'·' };
  const div = document.createElement('div');
  div.className = `log-line ${type}`;
  div.innerHTML = `<span class="ic">${icons[type]||'·'}</span><span class="msg">${msg}</span>`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function showErr(msg) {
  const b = document.getElementById('errBox');
  b.textContent = '⚠  ' + msg;
  b.style.display = 'block';
}

async function run() {
  const sourceUrl = document.getElementById('sourceUrl').value.trim();
  const token     = document.getElementById('token').value.trim();
  const targetUrl = document.getElementById('targetUrl').value.trim();
  const username  = document.getElementById('username').value.trim();
  const email     = document.getElementById('email').value.trim();
  const banner    = document.getElementById('banner').value.trim();

  document.getElementById('errBox').style.display = 'none';

  if (!sourceUrl || !token || !targetUrl || !username || !email) {
    showErr('Please fill in all required fields.');
    return;
  }

  if (!sourceUrl.includes('github.com') || !targetUrl.includes('github.com')) {
    showErr('Only GitHub URLs are supported.');
    return;
  }

  document.getElementById('runBtn').disabled = true;
  document.getElementById('progCard').style.display = 'block';
  document.getElementById('doneCard').style.display = 'none';
  document.getElementById('logBox').innerHTML = '';

  try {
    const resp = await fetch('/api/obfuscate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sourceUrl, token, targetUrl, username, email, banner: banner || undefined })
    });

    const reader = resp.body.getReader();
    const dec    = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });

      const parts = buf.split('\n\n');
      buf = parts.pop();

      for (const chunk of parts) {
        if (!chunk.trim()) continue;
        let event = 'log', dataStr = '';
        for (const line of chunk.split('\n')) {
          if (line.startsWith('event:')) event = line.slice(6).trim();
          if (line.startsWith('data:'))  dataStr = line.slice(5).trim();
        }
        try {
          const data = JSON.parse(dataStr);
          if (event === 'log')   addLog(data.type, data.msg);
          if (event === 'done')  showDone(data);
          if (event === 'error') { addLog('error', data.message); }
        } catch {}
      }
    }

  } catch (err) {
    addLog('error', '❌ ' + err.message);
  } finally {
    document.getElementById('runBtn').disabled = false;
    document.getElementById('progFill').classList.remove('spin');
    document.getElementById('progFill').style.width = '100%';
  }
}

function showDone(data) {
  document.getElementById('sTotal').textContent = data.total  ?? 0;
  document.getElementById('sObf').textContent   = data.obfuscated ?? 0;
  document.getElementById('sSkip').textContent  = data.skipped ?? 0;
  document.getElementById('sFail').textContent  = data.failed  ?? 0;

  const fl = document.getElementById('fileList');
  fl.innerHTML = '';
  const icons = { success: '✓', skipped: '⏭', failed: '✗' };
  const cls   = { success: 's-ok', skipped: 's-skp', failed: 's-err' };
  for (const f of (data.files || [])) {
    const d = document.createElement('div');
    d.className = `fe ${cls[f.status]||''}`;
    d.innerHTML = `<span class="ic">${icons[f.status]||'·'}</span><span class="fp">${f.path}</span>`;
    fl.appendChild(d);
  }

  document.getElementById('doneCard').style.display = 'block';
}

function reset() {
  document.getElementById('progCard').style.display = 'none';
  document.getElementById('doneCard').style.display = 'none';
  document.getElementById('progFill').classList.add('spin');
  document.getElementById('progFill').style.width = '0%';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
